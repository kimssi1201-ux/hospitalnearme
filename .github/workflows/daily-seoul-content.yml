name: Daily Seoul content refresh

on:
  schedule:
    # 05:00 KST every day.
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh Seoul event data
        run: node scripts/update-seoul-content.mjs
        env:
          SITE_ORIGIN: https://view1.kr
          PUBLIC_SITE_URL: https://view1.kr
          MAX_SITEMAP_EVENTS: "160"

      - name: Commit refreshed data
        run: |
          if [ -n "$(git status --porcelain generated/seoul-events.json sitemap.xml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add generated/seoul-events.json sitemap.xml
            git commit -m "Refresh Seoul event data"
            git push
          else
            echo "No content changes."
          fi
